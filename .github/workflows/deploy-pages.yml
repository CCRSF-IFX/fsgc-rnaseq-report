name: Deploy report demo to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: Overwrite an existing webR package snapshot version
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pages: write
  id-token: write
  repository-projects: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read webR package snapshot version
        id: webr-snapshot
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < webr-packages/VERSION)"
          if [[ -z "$version" ]]; then
            echo "webr-packages/VERSION is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Read webR library bundle settings
        id: webr-library
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import re
          from pathlib import Path

          cfg = json.load(open("assets/report_config.json", encoding="utf-8")).get("webr", {})
          bundle = cfg.get("libraryBundle") or {}
          snapshot_version = Path("webr-packages/VERSION").read_text(encoding="utf-8").strip()
          version = str(bundle.get("artifactVersion") or bundle.get("version") or snapshot_version).strip()
          artifact_stem = str(bundle.get("artifactStem") or "rnaseq-report-webr-library").strip()
          release_tag = str(bundle.get("releaseTag") or f"{artifact_stem}-{version}").strip()

          safe = re.compile(r"^[A-Za-z0-9._-]+$")
          for label, value in {
              "libraryBundle.artifactVersion": version,
              "libraryBundle.artifactStem": artifact_stem,
              "libraryBundle.releaseTag": release_tag,
          }.items():
              if not value or not safe.match(value):
                  raise SystemExit(f"Unsafe {label}: {value!r}")

          print(f"version={version}")
          print(f"artifact_stem={artifact_stem}")
          print(f"release_tag={release_tag}")
          PY

      - name: Guard existing webR package snapshot
        shell: bash
        env:
          FORCE_OVERWRITE: ${{ github.event.inputs.force_overwrite || 'false' }}
        run: |
          version="${{ steps.webr-snapshot.outputs.version }}"
          package_repo_url="$(python3 -c 'import json; print(json.load(open("assets/report_config.json", encoding="utf-8"))["webr"]["packageRepo"].rstrip("/"))')"
          if [[ "$package_repo_url" != */"$version" ]]; then
            echo "assets/report_config.json packageRepo must end with webr-packages/$version" >&2
            echo "Current packageRepo: $package_repo_url" >&2
            exit 1
          fi

          packages_url="$package_repo_url/bin/emscripten/contrib/4.5/PACKAGES"
          if curl -fsSIL "$packages_url" >/dev/null 2>&1; then
            if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" || "$FORCE_OVERWRITE" != "true" ]]; then
              echo "webR package snapshot $version already exists:" >&2
              echo "$packages_url" >&2
              echo "Refusing to overwrite. Bump webr-packages/VERSION or run the workflow manually with force_overwrite=true." >&2
              exit 1
            fi
            echo "::warning::Force overwrite enabled for existing webR package snapshot $version"
          else
            echo "No existing webR package snapshot found for $version"
          fi

      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'dist/' \
            --exclude 'local_data/' \
            --exclude 'large_outputs/' \
            --exclude 'webr-packages/' \
            ./ _site/
          touch _site/.nojekyll

      - name: Restore preserved webR package snapshots
        shell: bash
        run: |
          current_version="${{ steps.webr-snapshot.outputs.version }}"
          package_repo_url="$(python3 -c 'import json; print(json.load(open("assets/report_config.json", encoding="utf-8"))["webr"]["packageRepo"].rstrip("/"))')"
          site_root="${package_repo_url%/webr-packages/*}"
          versions_file="webr-packages/published_versions"
          if [[ ! -f "$versions_file" ]]; then
            echo "No preserved webR package snapshot list found."
            exit 0
          fi

          awk '
            {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0)
              if ($0 != "" && substr($0, 1, 1) != "#") print $0
            }
          ' "$versions_file" | while read -r version; do
            if [[ "$version" == "$current_version" ]]; then
              continue
            fi

            src="$site_root/webr-packages/$version/bin/emscripten/contrib/4.5"
            dest="_site/webr-packages/$version/bin/emscripten/contrib/4.5"
            packages_file="$(mktemp)"
            if ! curl -fsSL "$src/PACKAGES" -o "$packages_file"; then
              echo "::warning::Could not restore prior webR package snapshot $version from $src/PACKAGES"
              rm -f "$packages_file"
              continue
            fi

            mkdir -p "$dest"
            cp "$packages_file" "$dest/PACKAGES"
            awk '
              /^Package:/ { package = $2 }
              /^Version:/ {
                version = $2
                if (package != "" && version != "") {
                  print package "_" version ".tgz"
                  package = ""
                  version = ""
                }
              }
            ' "$packages_file" | while read -r artifact; do
              curl -fsSL "$src/$artifact" -o "$dest/$artifact"
            done
            rm -f "$packages_file"
            echo "Restored preserved webR package snapshot $version"
          done

      - name: Checkout r-wasm/actions repository
        uses: actions/checkout@v4
        with:
          ref: v2
          repository: r-wasm/actions
          token: ${{ secrets.GITHUB_TOKEN }}
          path: .actions

      - name: Retrieve webR package refs
        id: packages-file
        shell: bash
        run: |
          pkgs="$(
            awk '
              {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0)
                if ($0 == "" || substr($0, 1, 1) == "#") next
                if (!seen[$0]++) {
                  if (out != "") out = out ","
                  out = out $0
                }
              }
              END { print out }
            ' webr-packages/packages
          )"
          if [[ -z "$pkgs" ]]; then
            echo "webr-packages/packages did not contain any package refs" >&2
            exit 1
          fi
          printf 'pkgs=%s\n' "$pkgs" >> "$GITHUB_OUTPUT"

      - name: Patch r-wasm action for package snapshot build
        shell: python
        run: |
          from pathlib import Path

          path = Path(".actions/build-rwasm/code.R")
          text = path.read_text()
          install = 'pak::pak(c("r-wasm/rwasm"))'
          patch = (
              'pak::pak(c("r-wasm/rwasm"))\n\n'
              'c17_makevars_src <- file.path("webr-packages", "patches", "rwasm-c17.mk")\n'
              'if (file.exists(c17_makevars_src)) {\n'
              '  webr_vars <- system.file("webr-vars.mk", package = "rwasm")\n'
              '  cat(c("", readLines(c17_makevars_src)), file = webr_vars, sep = "\\n", append = TRUE)\n'
              '  message("Installed webR C17 compiler override: ", webr_vars)\n'
              '}\n'
          )
          if install not in text:
              raise SystemExit("Expected rwasm install call was not found")
          text = text.replace(install, patch)

          old = 'rwasm::add_pkg(packages, repo_dir = repo_path, compress = compress)'
          new = (
              'fastmatch_src <- file.path("webr-packages", "patched-src", "fastmatch")\n'
              'if (dir.exists(fastmatch_src)) {\n'
              '  fastmatch_ref <- paste0("local::", normalizePath(fastmatch_src, winslash = "/", mustWork = TRUE))\n'
              '  packages <- vapply(packages, function(pkg) {\n'
              '    pkg_name <- sub("@.*$", "", pkg)\n'
              '    pkg_name <- sub("^.*::", "", pkg_name)\n'
              '    pkg_name <- sub("^.*/", "", pkg_name)\n'
              '    if (identical(pkg_name, "fastmatch")) fastmatch_ref else pkg\n'
              '  }, character(1))\n'
              '  message("Using patched fastmatch package ref: ", fastmatch_ref)\n'
              '}\n'
              'rwasm::add_pkg(packages, repo_dir = repo_path, remotes = NULL, compress = compress)'
          )
          if old not in text:
              raise SystemExit("Expected rwasm::add_pkg() call was not found")
          path.write_text(text.replace(old, new))

      - name: Prepare patched fastmatch source
        shell: bash
        run: python3 webr-packages/patches/prepare_fastmatch_source.py

      - name: Build versioned webR package repo
        uses: ./.actions/build-rwasm
        with:
          packages: ${{ steps.packages-file.outputs.pkgs }}
          repo-path: _site/webr-packages/${{ steps.webr-snapshot.outputs.version }}
          webr-image: ghcr.io/r-wasm/webr:v0.5.9
          compress: false

      - name: Fix generated package permissions
        shell: bash
        run: sudo chown -R "$(id -u):$(id -g)" _site/webr-packages

      - name: Verify webR package snapshot contents
        shell: bash
        run: |
          package_index="_site/webr-packages/${{ steps.webr-snapshot.outputs.version }}/bin/emscripten/contrib/4.5/PACKAGES"
          if [[ ! -f "$package_index" ]]; then
            echo "Package index was not built: $package_index" >&2
            exit 1
          fi

          mapfile -t expected < <(
            awk '
              {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0)
                if ($0 == "" || substr($0, 1, 1) == "#") next
                sub("@.*$", "", $0)
                sub("^.*::", "", $0)
                sub("^.*/", "", $0)
                if (!seen[$0]++) print $0
              }
            ' webr-packages/packages
          )
          mapfile -t available < <(awk '/^Package:/ { print $2 }' "$package_index" | sort -u)

          missing=()
          for package in "${expected[@]}"; do
            if ! printf '%s\n' "${available[@]}" | grep -Fxq "$package"; then
              missing+=("$package")
            fi
          done

          if (( ${#missing[@]} )); then
            echo "The webR package snapshot is missing required binary packages:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

          printf 'Verified webR package snapshot packages: %s\n' "${expected[*]}"

      - name: Verify webR package ABI
        shell: bash
        run: |
          package_dir="_site/webr-packages/${{ steps.webr-snapshot.outputs.version }}/bin/emscripten/contrib/4.5"
          fastmatch_pkg="$(find "$package_dir" -maxdepth 1 -name 'fastmatch_*.tgz' -print -quit)"
          if [[ -z "$fastmatch_pkg" ]]; then
            echo "fastmatch package was not built in $package_dir" >&2
            exit 1
          fi

          runtime_base="$(python3 -c 'import json; print(json.load(open("assets/report_config.json", encoding="utf-8"))["webr"]["baseUrl"].rstrip("/"))')"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "$runtime_base/R.wasm" -o "$tmpdir/R.wasm"
          tar -xzf "$fastmatch_pkg" -C "$tmpdir"
          node scripts/check_webr_package_abi.js "$tmpdir/R.wasm" "$tmpdir/fastmatch/libs/fastmatch.so"

      - name: Build webR package snapshot archive
        shell: bash
        env:
          VERSION: ${{ steps.webr-snapshot.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          version = os.environ["VERSION"]
          snapshot_dir = Path("_site/webr-packages") / version
          package_dir = snapshot_dir / "bin/emscripten/contrib/4.5"
          if not package_dir.exists():
              raise SystemExit(f"Package directory was not built: {package_dir}")

          release_dir = Path("_release_assets")
          release_dir.mkdir(parents=True, exist_ok=True)
          archive = release_dir / f"webr-packages-{version}.zip"
          if archive.exists():
              archive.unlink()

          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(package_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(snapshot_dir))
          print(f"Wrote {archive}")
          PY

      - name: Build webR library bundle release files
        shell: bash
        env:
          VERSION: ${{ steps.webr-snapshot.outputs.version }}
          LIBRARY_BUNDLE_VERSION: ${{ steps.webr-library.outputs.version }}
          LIBRARY_ARTIFACT_STEM: ${{ steps.webr-library.outputs.artifact_stem }}
        run: |
          set -euo pipefail
          mkdir -p _release_assets
          docker run --rm \
            -e VERSION="$VERSION" \
            -e LIBRARY_BUNDLE_VERSION="$LIBRARY_BUNDLE_VERSION" \
            -e LIBRARY_ARTIFACT_STEM="$LIBRARY_ARTIFACT_STEM" \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/r-wasm/webr:v0.5.9 \
            Rscript -e '
              if (!requireNamespace("pak", quietly = TRUE)) {
                install.packages("pak", repos = "https://cloud.r-project.org")
              }
              pak::pak("r-wasm/rwasm")

              version <- Sys.getenv("VERSION")
              library_version <- Sys.getenv("LIBRARY_BUNDLE_VERSION")
              artifact_stem <- Sys.getenv("LIBRARY_ARTIFACT_STEM")
              bundle_stem <- paste0(artifact_stem, "-", library_version)
              repo_dir <- file.path("_site", "webr-packages", version)
              out_dir <- file.path("_release_assets", bundle_stem)
              dir.create(out_dir, recursive = TRUE, showWarnings = FALSE)
              rwasm::make_vfs_library(
                out_dir = out_dir,
                out_name = "library.data",
                repo_dir = repo_dir,
                compress = TRUE,
                strip = c("doc", "html", "help", "demo", "tests", "testthat", "vignettes")
              )

              data_files <- list.files(out_dir, pattern = "\\.data\\.gz$", full.names = TRUE)
              metadata_files <- list.files(out_dir, pattern = "\\.js\\.metadata$", full.names = TRUE)
              if (length(data_files) != 1 || length(metadata_files) != 1) {
                stop("Expected one .data.gz and one .js.metadata file in ", out_dir)
              }
              file.copy(data_files, file.path("_release_assets", paste0(bundle_stem, ".data.gz")), overwrite = TRUE)
              file.copy(metadata_files, file.path("_release_assets", paste0(bundle_stem, ".js.metadata")), overwrite = TRUE)
            '

          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          bundle_stem = f"{os.environ['LIBRARY_ARTIFACT_STEM']}-{os.environ['LIBRARY_BUNDLE_VERSION']}"
          release_dir = Path("_release_assets")
          archive = release_dir / f"{bundle_stem}.zip"
          if archive.exists():
              archive.unlink()
          files = [
              release_dir / f"{bundle_stem}.data.gz",
              release_dir / f"{bundle_stem}.js.metadata",
          ]
          for path in files:
              if not path.exists():
                  raise SystemExit(f"Missing library bundle file: {path}")
          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in files:
                  zf.write(path, path.name)
          print(f"Wrote {archive}")
          PY

      - name: Upload webR package snapshot archive to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.webr-snapshot.outputs.version }}
        run: |
          set -euo pipefail
          tag="webr-packages-${VERSION}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "webR package snapshot ${VERSION}" \
              --notes "Compiled webR package repository archive for rnaseq-report package snapshot ${VERSION}."
          fi
          gh release upload "$tag" \
            "_release_assets/webr-packages-${VERSION}.zip" \
            --clobber

      - name: Upload webR library bundle to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LIBRARY_BUNDLE_VERSION: ${{ steps.webr-library.outputs.version }}
          LIBRARY_ARTIFACT_STEM: ${{ steps.webr-library.outputs.artifact_stem }}
          LIBRARY_RELEASE_TAG: ${{ steps.webr-library.outputs.release_tag }}
          PACKAGE_VERSION: ${{ steps.webr-snapshot.outputs.version }}
        run: |
          set -euo pipefail
          bundle_stem="${LIBRARY_ARTIFACT_STEM}-${LIBRARY_BUNDLE_VERSION}"
          if ! gh release view "$LIBRARY_RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$LIBRARY_RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "rnaseq-report webR library ${LIBRARY_BUNDLE_VERSION}" \
              --notes "Browser-loadable rnaseq-report webR library bundle ${LIBRARY_BUNDLE_VERSION}, built from package snapshot ${PACKAGE_VERSION}."
          fi
          gh release upload "$LIBRARY_RELEASE_TAG" \
            "_release_assets/${bundle_stem}.data.gz" \
            "_release_assets/${bundle_stem}.js.metadata" \
            "_release_assets/${bundle_stem}.zip" \
            --clobber

      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
