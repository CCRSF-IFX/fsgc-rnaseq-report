# Project Information
site_name: RNA-seq Report Documentation
site_author: FSGC Bioinformatics Group
site_description: >-
  RNA-seq Report is a portable, browser-based report viewer for RNA-seq
  pipeline outputs, standalone HTML delivery, and optional in-browser analysis.

# Repository
repo_name: CCRSF-IFX/fsgc-rnaseq-report
repo_url: https://github.com/CCRSF-IFX/fsgc-rnaseq-report
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 FSGC Bioinformatics Group

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - bash
    - javascript
    - json
    - python
    - r
    - yaml

exclude_docs: |
  developer-guide/ai-assistant.md

# Page Tree
nav:
  - Home: index.md
  - User Guide:
      - Overview: user-guide/index.md
      - Open The Report: user-guide/open-report.md
      - Data And Metadata: user-guide/data-and-metadata.md
      - Explore QC, PCA, And Heatmaps: user-guide/explore-report.md
      - DESeq2 Analysis: user-guide/deseq2.md
      - GSEA Analysis: user-guide/fgsea.md
      - Cache And Offline Use: user-guide/cache-and-offline.md
      - Troubleshooting: user-guide/troubleshooting.md
      - FAQ: user-guide/faq.md
  - Developer Guide:
      - Overview: developer-guide/index.md
      - Report Architecture: developer-guide/architecture.md
      - Data Assets: developer-guide/data-assets.md
      - Standalone Builds: developer-guide/standalone-builds.md
      - GitHub Pages And Versioning: developer-guide/github-pages.md
      - webR Packages: developer-guide/webr-packages.md
      - CI Workflows: developer-guide/ci-workflows.md
      - Troubleshooting: developer-guide/troubleshooting.md
  - Reference: ref.md
  - License: license.md
